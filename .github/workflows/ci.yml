name: build-test-govern

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew install cmake ninja pkg-config bison cassandra-cpp-driver
          # macos-14 runners ship Apple's ancient BSD bison at /usr/bin/bison
          # (via the Xcode toolchain), which lacks --file-prefix-map and
          # breaks vcpkg's thrift port build. Prepend Homebrew's bison
          # (keg-only, not linked by default) so it wins on PATH.
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          # cassandra-cpp-driver has no vcpkg port (see
          # libs/storage/cassandra_client/CMakeLists.txt's own comment) --
          # it's a system dependency installed via Homebrew, same as bison.

      - name: Start Kafka + Cassandra for the integration tests
        run: |
          # macos-14 runners can't use GitHub Actions' `services:` block
          # (service containers require a Linux/Docker host) -- the
          # [kafka]/[cassandra]-tagged integration tests
          # (libs/streaming/kafka_client, libs/storage/cassandra_client,
          # services/stream_consumers/*) need real local brokers, so start
          # them via `brew services` instead, same as this repo's dev
          # environment. Kicked off now, in parallel with the vcpkg
          # install/build below, so they've had time to warm up by the
          # time the Test step needs them.
          brew install kafka cassandra
          brew services start kafka
          brew services start cassandra

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            build/ci-build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: cmake --preset ci-build

      - name: Build
        run: cmake --build --preset ci-build

      - name: Wait for Kafka + Cassandra
        run: |
          echo "Waiting for Kafka on :9092..."
          for i in $(seq 1 30); do
            nc -z localhost 9092 && { echo "Kafka is up"; break; }
            sleep 2
          done
          nc -z localhost 9092 || { echo "Kafka never came up"; exit 1; }

          echo "Waiting for Cassandra on :9042..."
          for i in $(seq 1 60); do
            nc -z localhost 9042 && { echo "Cassandra port is open"; break; }
            sleep 2
          done
          nc -z localhost 9042 || { echo "Cassandra never came up"; exit 1; }

          # The CQL port opens before the node has finished initializing
          # (system keyspaces, gossip) -- cqlsh succeeding is the real
          # readiness signal MarketStore's own tests depend on.
          echo "Waiting for Cassandra to accept CQL queries..."
          for i in $(seq 1 60); do
            "$(brew --prefix cassandra)/bin/cqlsh" -e "describe cluster" >/dev/null 2>&1 && { echo "Cassandra is ready"; break; }
            sleep 2
          done
          "$(brew --prefix cassandra)/bin/cqlsh" -e "describe cluster" >/dev/null 2>&1 || { echo "Cassandra never became query-ready"; exit 1; }

      - name: Test
        run: ctest --preset ci-test

  governance:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Phase-boundary / layering check
        run: python3 scripts/check_layering.py

  integrity:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Verify tracked-file checksums
        run: bash scripts/verify_integrity.sh

  # Activated starting with Phase 6 (PIT/backtest modules): a required,
  # blocking check specifically for changes to libs/quant_core/backtest/**,
  # running the exact-match inclusion-set + lookahead-injection adversarial
  # tests described in docs/MIGRATION_PLAN.md. Left as a placeholder here
  # since that library doesn't exist yet in Phase 0/1.
  # parity-gate:
  #   if: contains(github.event.pull_request.changed_files, 'libs/quant_core/backtest/')
  #   runs-on: macos-14
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: ctest --preset ci-test -L pit-lookahead-gate
